apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  labels:
    app: simple-color-app
  name: simple-color-app
spec:
  replicas: 5
  selector:
    matchLabels:
      app: simple-color-app
  template:
    metadata:
      labels:
        app: simple-color-app
    spec:
      containers:
      - image: lmacademy/simple-color-app:1.0.0
        name: simple-color-app
        env:
          - name: APP_COLOR
            value: 'blue'
  strategy:
    canary:
      steps:
        - setWeight: 20
        - pause: {}
