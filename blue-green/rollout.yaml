apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: rollout-bluegreen
  namespace: bluegreen-lab
spec:
  replicas:
  selector:
    matchLabels:
      app: rollout-blue-green
  template:
    metadata:
      labels:
        app: rollout-blue-green
    spec:
      containers:
      - name: blue-green-app
        image: lmacademy/simple-color-app:1.0.0
        env:
          - name: APP_COLOR
            value: 'green'
  strategy:
    blueGreen:
      activeService: rollout-blue-green-active
      previewService: rollout-blue-green-preview
      autoPromotionEnabled: false