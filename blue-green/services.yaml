apiVersion: v1
kind: Service
metadata:
  labels:
    app: rollout-blue-green-active
  name: rollout-blue-green-active
  namespace: bluegreen-lab
spec:
  ports:
  - port: 3000
    protocol: TCP
    targetPort: 3000
  selector:
    app: rollout-blue-green
  type: ClusterIP

